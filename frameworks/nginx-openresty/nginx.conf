env DATABASE_URL;
worker_processes auto;
worker_rlimit_nofile 65536;

events {
    worker_connections 65536;
    multi_accept on;
}

http {
    access_log off;
    error_log /dev/null crit;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000000;
    server_tokens off;
    client_max_body_size 25m;
    client_body_buffer_size 25m;

    gzip on;
    gzip_types application/json;
    gzip_min_length 100;
    gzip_comp_level 1;

    init_by_lua_block {
        require("handler").init()
    }

    init_worker_by_lua_block {
        require("handler").init_worker()
    }

    server {
        listen 8080 reuseport;

        # Reject unknown HTTP methods — only allow GET, HEAD, POST
        access_by_lua_block {
            local m = ngx.req.get_method()
            if m ~= "GET" and m ~= "HEAD" and m ~= "POST" then
                ngx.status = 405
                ngx.header["Content-Type"] = "text/plain"
                ngx.say("Method Not Allowed")
                return ngx.exit(405)
            end
        }

        location /pipeline { content_by_lua_block { require("handler").pipeline() } }
        location /baseline11 { content_by_lua_block { require("handler").baseline11() } }
        location /baseline2 { content_by_lua_block { require("handler").baseline2() } }
        location /json { content_by_lua_block { require("handler").json() } }
        location /compression { content_by_lua_block { require("handler").compression() } }
        location /upload { content_by_lua_block { require("handler").upload() } }
        location /static/ { content_by_lua_block { require("handler").static_file() } }
        location /db { content_by_lua_block { require("handler").db() } }
        location /async-db { content_by_lua_block { require("handler").async_db() } }
    }

    server {
        listen 8443 ssl reuseport;
        http2 on;

        ssl_certificate /certs/server.crt;
        ssl_certificate_key /certs/server.key;
        ssl_protocols TLSv1.3;

        location /baseline2 { content_by_lua_block { require("handler").baseline2() } }
        location /static/ { content_by_lua_block { require("handler").static_file() } }
    }
}
