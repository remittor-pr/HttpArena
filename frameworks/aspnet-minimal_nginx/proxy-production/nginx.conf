# nginx edge for the production-stack test.
#
# Layout:
#   /static/*        — served directly from disk (precompressed sidecars)
#   /public/*        — no auth, forwarded to the aspnet backend
#   /api/*           — protected by auth_request → authsvc (JWT verification)
#                      On 200 from authsvc, the X-User-Id response header
#                      is extracted and forwarded to the backend.
#
# Auth model: stateless JWT. Every /api/* request triggers a subrequest
# to authsvc which verifies the HMAC-SHA256 signature on the Bearer token
# and extracts the user_id from the JWT claims. No caching — every
# subrequest does real cryptographic work. This models the stateless-auth
# pattern used by most modern API gateways.

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 65535;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    gzip_static on;
    gzip_vary on;

    keepalive_timeout 65;
    keepalive_requests 10000;

    access_log off;
    error_log /dev/stderr warn;

    upstream backend {
        server 127.0.0.1:8080;
        keepalive 2048;
        keepalive_requests 100000;
        keepalive_timeout 300s;
    }

    upstream authsvc {
        server 127.0.0.1:9090;
        keepalive 256;
        keepalive_requests 100000;
        keepalive_timeout 300s;
    }

    server {
        listen 8443 ssl http2;

        ssl_certificate /certs/server.crt;
        ssl_certificate_key /certs/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        auth_request_set $auth_user_id $upstream_http_x_user_id;

        # Internal auth subrequest — forwards the Authorization header
        # to authsvc for JWT verification on every /api/* call. No
        # caching: authsvc does HMAC-SHA256 verification on every
        # request, which is the intended measurement.
        location = /_auth {
            internal;
            proxy_pass http://authsvc/_auth;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }

        # Static files — served directly from disk.
        location /static/ {
            alias /data/static/;
            expires off;
            add_header Cache-Control "no-cache";
        }

        # Public endpoints — forwarded to the backend without auth.
        location /public/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        # Authenticated endpoints — JWT verified via auth_request on
        # every call. No proxy_cache, no shortcuts.
        location /api/ {
            auth_request /_auth;
            error_page 401 = @auth_failed;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-User-Id $auth_user_id;
        }

        location @auth_failed {
            add_header Content-Type "application/json" always;
            return 401 '{"error":"unauthorized"}';
        }
    }
}
