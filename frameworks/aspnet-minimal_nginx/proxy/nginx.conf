worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 65535;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Serve precompressed sidecar files (foo.gz) from disk when the client
    # advertises Accept-Encoding: gzip. Avoids per-request compression cost
    # entirely — data is already on disk, just needs sendfile + correct headers.
    gzip_static on;
    gzip_vary on;

    keepalive_timeout 65;
    keepalive_requests 10000;

    access_log off;
    error_log /dev/stderr warn;

    upstream backend {
        server 127.0.0.1:8080;
        keepalive 2048;
        keepalive_requests 100000;
        keepalive_timeout 300s;
    }

    server {
        listen 8443 ssl http2;

        ssl_certificate /certs/server.crt;
        ssl_certificate_key /certs/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # Static files served directly by nginx
        location /static/ {
            alias /data/static/;
            expires off;
            add_header Cache-Control "no-cache";
        }

        # Dynamic endpoints proxied to ASP.NET via HTTP/1.1
        location /baseline2 {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        location /json {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        location /async-db {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }
    }
}
