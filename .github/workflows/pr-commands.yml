name: PR Commands

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  actions: write

jobs:
  runner-busy:
    if: github.event.issue.pull_request && (contains(github.event.comment.body, '/validate') || contains(github.event.comment.body, '/benchmark')) && vars.RUNNER_LOCAL == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Post runner-busy notice
        run: |
          gh api "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" -f content="eyes"
          gh pr comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "⏸️ Runner is currently performing local benchmark runs and is disabled for GitHub Actions, please try later or check our Discord announcements on runner state for more info."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  acknowledge:
    if: github.event.issue.pull_request && (contains(github.event.comment.body, '/validate') || contains(github.event.comment.body, '/benchmark')) && vars.RUNNER_LOCAL != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge command
        run: |
          COMMAND="validate"
          if echo "$COMMENT_BODY" | grep -q '/benchmark'; then COMMAND="benchmark"; fi
          gh api "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" -f content="eyes"
          gh pr comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "👋 \`/$COMMAND\` request received. A collaborator will review and approve the run."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}

  handle-command:
    needs: acknowledge
    if: github.event.issue.pull_request && (contains(github.event.comment.body, '/validate') || contains(github.event.comment.body, '/benchmark')) && vars.RUNNER_LOCAL != 'true'
    runs-on: self-hosted
    environment: runner
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
          fetch-depth: 0

      - name: Parse command
        id: parse
        run: |
          PR="$PR_NUMBER"
          echo "pr=$PR" >> "$GITHUB_OUTPUT"

          # Detect changed frameworks from PR files via API (paginated, fallback)
          AUTO_FRAMEWORK=$(gh api "/repos/$REPO/pulls/$PR/files" --paginate --jq '.[].filename' | grep '^frameworks/' | cut -d'/' -f2 | sort -u | head -1)

          if echo "$COMMENT_BODY" | grep -q '/benchmark'; then
            echo "command=benchmark" >> "$GITHUB_OUTPUT"

            # Parse flags: -f <framework> -t <test>
            EXPLICIT_FW=$(echo "$COMMENT_BODY" | grep -oP '/benchmark\s+.*-f\s+\K\S+' || echo "")
            EXPLICIT_TEST=$(echo "$COMMENT_BODY" | grep -oP '/benchmark\s+.*-t\s+\K\S+' || echo "")

            # Fallback: positional arg (legacy: /benchmark baseline)
            if [ -z "$EXPLICIT_FW" ] && [ -z "$EXPLICIT_TEST" ]; then
              EXPLICIT_TEST=$(echo "$COMMENT_BODY" | grep -oP '/benchmark\s+\K[^-]\S*' || echo "")
            fi

            # Parse --save flag
            SAVE_FLAG=""
            if echo "$COMMENT_BODY" | grep -q '\-\-save'; then
              SAVE_FLAG="true"
            fi

            FRAMEWORK="${EXPLICIT_FW:-$AUTO_FRAMEWORK}"
            echo "framework=$FRAMEWORK" >> "$GITHUB_OUTPUT"
            echo "profile=$EXPLICIT_TEST" >> "$GITHUB_OUTPUT"
            echo "save=$SAVE_FLAG" >> "$GITHUB_OUTPUT"
            echo "Detected framework: $FRAMEWORK (auto: $AUTO_FRAMEWORK, explicit: $EXPLICIT_FW)"
            echo "Profile: $EXPLICIT_TEST, Save: $SAVE_FLAG"

          elif echo "$COMMENT_BODY" | grep -q '/validate'; then
            echo "command=validate" >> "$GITHUB_OUTPUT"

            # Parse -f flag for validate too
            EXPLICIT_FW=$(echo "$COMMENT_BODY" | grep -oP '/validate\s+.*-f\s+\K\S+' || echo "")
            FRAMEWORK="${EXPLICIT_FW:-$AUTO_FRAMEWORK}"
            echo "framework=$FRAMEWORK" >> "$GITHUB_OUTPUT"
            echo "Detected framework: $FRAMEWORK"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}

      - name: React to comment
        run: |
          gh api "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" -f content="rocket"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run validate
        if: steps.parse.outputs.command == 'validate' && steps.parse.outputs.framework != ''
        run: |
          FRAMEWORK="${{ steps.parse.outputs.framework }}"
          echo "Validating $FRAMEWORK..."
          if ./scripts/validate.sh "$FRAMEWORK" 2>&1 | tee /tmp/validate.log; then
            STATUS="✅ Validation **passed** for \`$FRAMEWORK\`"
          else
            STATUS="❌ Validation **failed** for \`$FRAMEWORK\`"
          fi

          BODY="$STATUS"$'\n\n'"<details><summary>Full log</summary>"$'\n\n```\n'"$(tail -100 /tmp/validate.log)"$'\n```\n</details>'
          gh pr comment "${{ steps.parse.outputs.pr }}" --body "$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run benchmark
        if: steps.parse.outputs.command == 'benchmark' && steps.parse.outputs.framework != ''
        run: |
          gh workflow run benchmark-pr.yml \
            -f pr=${{ steps.parse.outputs.pr }} \
            -f framework=${{ steps.parse.outputs.framework }} \
            -f profile="${{ steps.parse.outputs.profile }}" \
            -f save="${{ steps.parse.outputs.save }}"

          gh pr comment "${{ steps.parse.outputs.pr }}" --body "🚀 Benchmark run triggered for \`${{ steps.parse.outputs.framework }}\`${{ steps.parse.outputs.profile && format(' (test: {0})', steps.parse.outputs.profile) || ' (all tests)' }}${{ steps.parse.outputs.save == 'true' && ' with --save' || '' }}. Results will be posted here when done."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No framework detected
        if: steps.parse.outputs.framework == ''
        run: |
          gh pr comment "${{ steps.parse.outputs.pr }}" --body "⚠️ Couldn't detect which framework to test. Either modify files under \`frameworks/<name>/\` or specify explicitly: \`/benchmark -f <framework> -t <test>\`"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
